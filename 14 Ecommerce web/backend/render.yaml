services:
  - type: web
    name: aerosports-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false        # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false        # Set this manually in Render dashboard
      - key: EMAIL_USER
        sync: false        # Set this manually in Render dashboard
      - key: EMAIL_PASS
        sync: false        # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false        # Set to your Vercel URL e.g. https://your-app.vercel.app
